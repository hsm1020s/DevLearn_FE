<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      보안 메타. frame-ancestors / X-Frame-Options 같은 일부 헤더는 meta 로는 효력이 없어
      운영 배포 시 reverse proxy 단(Nginx 등) 에서 응답 헤더로 함께 설정해야 한다.
      여기서는 meta 로 효력 있는 정책만 적용한다.
    -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(self), camera=()" />
    <!--
      Content-Security-Policy
        - script-src 'self' : 인라인 스크립트/eval 차단 (XSS 1차 방어)
        - style-src  'unsafe-inline' : framer-motion / Tailwind / JIT 가 주입하는 인라인 style 허용
        - connect-src http: https: ws: wss: : 개발(Vite HMR ws) + 운영(API URL 미지정) 모두 커버.
                                                운영에선 reverse proxy 헤더로 도메인을 좁혀 강화 권장.
        - object-src 'none' : Flash/플러그인 차단
        - base-uri  'self' : <base> 주입 공격 차단
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DevLearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
